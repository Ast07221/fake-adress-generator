<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address Generator Pro</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

.wrapper{
    width:100%;
    max-width:860px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px 20px 120px 20px;
    box-sizing:border-box;
    position:relative;
}

.output{
    width:100%;
    max-width:700px;
    max-height:calc(100vh - 180px);
    overflow-y:auto;
    text-align:left;
}

.card{
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.lineWrap{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
}

.left{
    display:flex;
    flex-direction:column;
}

.labelAddress{
    color:#7a7a7a;
    font-size:11px;
    letter-spacing:2px;
    margin-bottom:3px;
}

.value{
    font-family:monospace;
    font-size:18px;
    color:#cfcfcf;
    word-break:break-word;
}

.copy{
    font-size:11px;
    color:#777;
    cursor:pointer;
    user-select:none;
}
.copy:hover{
    color:#fff;
}

.topbar{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:16px;
    align-items:center;
}

button{
    background:#0b0b0b;
    border:none;
    color:#fff;
    cursor:pointer;
    font-size:14px;
}

input{
    width:60px;
    background:none;
    border:none;
    color:#fff;
    text-align:center;
}

select{
    background:#0b0b0b;
    color:#fff;
    border:none;
}

.loader{
    position:absolute;
    top:18%;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    opacity:.8;
}

.dots span{
    animation:blinkDots 1.2s infinite;
}

.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blinkDots{
    0%,20%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="loader" id="loader">
    GENERATING
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div class="output" id="output"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="copyAll()">copy</button>
    <input id="count" type="number" value="5" min="1" max="50">

    <select id="country">
        <option value="US">USA</option>
        <option value="UK">UK</option>
        <option value="DE">Germany</option>
        <option value="FR">France</option>
        <option value="NL">Netherlands</option>
        <option value="ES">Spain</option>
        <option value="IT">Italy</option>
    </select>
</div>

<script>

const output = document.getElementById("output");
const loader = document.getElementById("loader");
let current = [];
let history = new Set();

const data = {
    US:{
        cities:["New York","Los Angeles","Chicago","Houston","Miami"],
        streets:["Main St","Oak St","Maple Ave","Pine St","Cedar Rd","Park Ave","King St"],
        zip:["10001","90001","60601","77001","33101"]
    },
    UK:{
        cities:["London","Manchester","Birmingham","Liverpool"],
        streets:["High Street","King Road","Queen Street","Church Lane","Station Road"],
        zip:["SW1A","M1 1AA","B1 1AA","L1 8JQ"]
    },
    DE:{
        cities:["Berlin","Munich","Hamburg","Cologne"],
        streets:["Hauptstrasse","Bahnhofstrasse","Marktweg","Friedrichstrasse"],
        zip:["10115","80331","20095","50667"]
    },
    FR:{
        cities:["Paris","Lyon","Marseille","Nice"],
        streets:["Rue de la Paix","Rue Victor Hugo","Avenue République","Boulevard Saint-Michel"],
        zip:["75001","69001","13001","06000"]
    },
    NL:{
        cities:["Amsterdam","Rotterdam","Utrecht"],
        streets:["Damrak","Leidsestraat","Kalverstraat","Prinsengracht"],
        zip:["1012","3011","3511"]
    },
    ES:{
        cities:["Madrid","Barcelona","Valencia"],
        streets:["Calle Mayor","Gran Via","Calle Real","Paseo del Prado"],
        zip:["28001","08001","46001"]
    },
    IT:{
        cities:["Rome","Milan","Naples"],
        streets:["Via Roma","Via Milano","Corso Italia","Via Nazionale"],
        zip:["00100","20100","80100"]
    }
};

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function formatAddress(country, d){
    const street = random(d.streets);
    const city = random(d.cities);
    const zip = random(d.zip);
    const number = Math.floor(Math.random()*999 + 1);
    const apt = Math.random()>0.7 ? `, Apt ${Math.floor(Math.random()*40+1)}` : "";

    // SaaS-level formatting per country
    if(country==="US"){
        return `${number} ${street}${apt}, ${city}, ${zip}, USA`;
    }
    if(country==="UK"){
        return `${number} ${street}${apt}, ${city}, ${zip}, UK`;
    }
    if(country==="DE"){
        return `${street} ${number}${apt}, ${zip} ${city}, Germany`;
    }
    if(country==="FR"){
        return `${number} ${street}${apt}, ${zip} ${city}, France`;
    }
    if(country==="NL"){
        return `${street} ${number}${apt}, ${zip} ${city}, Netherlands`;
    }
    if(country==="ES"){
        return `${street} ${number}${apt}, ${city} ${zip}, Spain`;
    }
    if(country==="IT"){
        return `${street} ${number}${apt}, ${zip} ${city}, Italy`;
    }
}

function generateAddress(){
    const country = document.getElementById("country").value;
    const d = data[country];

    let addr;
    let tries = 0;

    // anti-duplicate logic
    do {
        addr = formatAddress(country, d);
        tries++;
    } while(history.has(addr) && tries < 10);

    history.add(addr);

    // memory limit
    if(history.size > 200){
        history.clear();
    }

    return addr;
}

function render(list){
    output.innerHTML="";

    list.forEach((addr,index)=>{
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="lineWrap">
                <div class="left">
                    <span class="labelAddress">ADDRESS</span>
                    <div class="value" id="a${index}"></div>
                </div>
                <div class="copy" onclick="copy('${addr}')">copy</div>
            </div>
        `;

        output.appendChild(card);

        const target=document.getElementById(`a${index}`);

        let i=0;
        function type(){
            if(i<addr.length){
                target.textContent += addr[i++];
                setTimeout(type,4);
            }
        }

        setTimeout(type,index*80);
    });
}

function generate(){
    loader.style.display="block";

    setTimeout(()=>{
        const count=Math.min(50, Math.max(1, parseInt(document.getElementById("count").value)||5));

        const list=[];
        for(let i=0;i<count;i++){
            list.push(generateAddress());
        }

        current=list;
        loader.style.display="none";
        render(list);

    },250);
}

function copy(text){
    navigator.clipboard.writeText(text);
}

function copyAll(){
    navigator.clipboard.writeText(current.join("\n"));
}

window.onload=generate;

</script>

</body>
</html>
